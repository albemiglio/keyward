  <rect x="46.5" y="49" width="7" height="27" rx="1.5" fill="#F4F3EE"/>
  <rect x="53.5" y="60" width="10" height="5.5" fill="#E5484D"/>
  <rect x="53.5" y="69" width="7" height="5.5" fill="#E5484D"/>
