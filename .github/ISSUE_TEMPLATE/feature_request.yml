name: Feature request
description: Suggest a new provider pattern, platform, or capability
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describe the problem first, then the solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Keyward doesn't handle today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Keyward to do? (e.g. detect a new provider, support a Wayland compositor, add a command)
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: If this is a new provider pattern — the format
      placeholder: "e.g. `xyz_[A-Za-z0-9]{32}` (use a fake example, never a real key)"
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, or existing tools/workarounds you've tried.
