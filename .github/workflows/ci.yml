name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile all Python sources
        run: python -m compileall hooks scripts tests

      - name: Validate JSON manifests
        shell: python
        run: |
          import json, sys
          for path in (".claude-plugin/plugin.json", "hooks/hooks.json"):
              with open(path, encoding="utf-8") as f:
                  json.load(f)
              print(f"ok: {path}")

      - name: Run test suite (regex-only; gitleaks tests self-skip)
        run: python -m unittest discover -s tests -p "test_*.py" -v

  test-with-gitleaks:
    name: test + gitleaks (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gitleaks
        run: |
          GL_VERSION="8.30.1"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run full test suite (gitleaks integration active)
        run: python -m unittest discover -s tests -p "test_*.py" -v
